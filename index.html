<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Frota Parada — Loc Frota</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     CONFIGURACAO — troque a URL abaixo pelo link do seu CSV
     publicado no Google Sheets (Arquivo > Compartilhar >
     Publicar na web > escolha a aba > formato CSV)
     ========================================================= */

  :root{
    --bg-page:#101A30;
    --bg-card:#182648;
    --bg-card-hover:#1E2E56;
    --border-line:#26325A;
    --text-primary:#F4F6FA;
    --text-secondary:#8B95A8;
    --text-muted:#5C6580;
    --accent:#F5A623;
    --accent-dark:#8A5A0B;
    --critico:#E24B4A;
    --critico-bg:rgba(226,75,74,0.14);
    --atencao:#EF9F27;
    --atencao-bg:rgba(239,159,39,0.14);
    --normal:#5DCAA5;
    --normal-bg:rgba(93,202,165,0.14);
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    background:var(--bg-page);
    color:var(--text-primary);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:32px 24px 64px;
  }

  .wrap{max-width:1180px;margin:0 auto;}

  /* ---------- Header ---------- */
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:20px;
  }

  .title-block{display:flex;align-items:center;gap:14px;}

  .logo-img{width:48px;height:48px;border-radius:11px;flex-shrink:0;}

  .title-block h1{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:26px;
    letter-spacing:0.3px;
    text-transform:uppercase;
    color:var(--accent);
  }

  .title-block p{
    color:var(--text-secondary);
    font-size:14px;
    margin-top:4px;
  }

  .header-meta{
    text-align:right;
    font-size:13px;
    color:var(--text-secondary);
  }

  .header-meta .dot{
    display:inline-block;
    width:8px;height:8px;
    border-radius:50%;
    background:var(--normal);
    margin-right:6px;
  }

  .header-meta .dot.stale{background:var(--critico);}

  #refresh-btn{
    margin-top:6px;
    background:transparent;
    border:1px solid var(--border-line);
    color:var(--text-primary);
    font-size:12px;
    padding:6px 12px;
    border-radius:4px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }

  #refresh-btn:hover{background:var(--bg-card-hover);}

  /* ---------- Road stripe divider (signature element) ---------- */
  .road-stripe{
    height:3px;
    background-image:repeating-linear-gradient(90deg,var(--accent) 0 24px, transparent 24px 44px);
    margin:20px 0 28px;
    opacity:0.9;
  }

  /* ---------- KPI strip ---------- */
  .kpis{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:12px;
    margin-bottom:28px;
  }

  .kpi-card{
    background:var(--bg-card);
    border:1px solid var(--border-line);
    border-radius:6px;
    padding:16px 18px;
    border-left:3px solid var(--border-line);
  }

  .kpi-card.critico{border-left-color:var(--critico);}
  .kpi-card.atencao{border-left-color:var(--atencao);}
  .kpi-card.normal{border-left-color:var(--normal);}
  .kpi-card.total{border-left-color:var(--accent);}

  .kpi-label{
    font-size:12px;
    color:var(--text-secondary);
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin-bottom:8px;
  }

  .kpi-value{
    font-family:'Oswald',sans-serif;
    font-size:32px;
    font-weight:600;
  }


  /* ---------- Cards de veículo ---------- */
  .cards-container{display:flex;flex-direction:column;gap:12px;}

  .vehicle-card{
    background:var(--bg-card);
    border:1px solid var(--border-line);
    border-radius:8px;
    padding:16px 18px;
    border-left:4px solid var(--border-line);
  }

  .vehicle-card.row-critico{border-left-color:var(--critico);}
  .vehicle-card.row-atencao{border-left-color:var(--atencao);}
  .vehicle-card.row-normal{border-left-color:var(--normal);}

  .vc-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:10px;
  }

  .vc-name{color:var(--text-primary);font-size:15px;font-weight:600;}
  .vc-sub{color:var(--text-secondary);font-size:12px;margin-top:2px;}

  .vc-right{text-align:right;flex-shrink:0;}
  .vc-dias{font-family:'Oswald',sans-serif;color:var(--accent);font-size:18px;font-weight:600;margin-top:4px;}

  .vc-field{margin-bottom:10px;}
  .vc-field:last-of-type{margin-bottom:0;}
  .vc-label{color:var(--text-secondary);font-size:11px;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:3px;}
  .vc-label.solucao-label{color:var(--accent);font-weight:600;}
  .vc-value{color:var(--text-primary);font-size:13px;line-height:1.4;}

  .vc-footer{
    display:flex;
    gap:24px;
    flex-wrap:wrap;
    font-size:11px;
    color:var(--text-muted);
    border-top:1px solid var(--border-line);
    padding-top:10px;
    margin-top:12px;
  }

  .vc-footer span{color:var(--text-secondary);}

  .bucket-strip{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
    margin-bottom:20px;
  }

  .bucket-card{
    background:var(--bg-card);
    border:1px solid var(--border-line);
    border-radius:6px;
    padding:10px 14px;
    text-align:center;
  }

  .bucket-card .bucket-label{font-size:11px;color:var(--text-secondary);text-transform:uppercase;margin-bottom:4px;}
  .bucket-card .bucket-value{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;}

  .analyst-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:10px;
    margin-bottom:24px;
  }

  .analyst-card{
    background:var(--bg-card);
    border:1px solid var(--border-line);
    border-radius:6px;
    padding:12px 14px;
    text-decoration:none;
    color:var(--text-primary);
    display:block;
    transition:background 0.15s;
  }

  .analyst-card:hover{background:var(--bg-card-hover);border-color:var(--accent);}

  .analyst-card .a-name{font-size:13px;font-weight:500;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .analyst-card .a-count{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;}

  .analyst-card .a-count.has-critico{color:var(--critico);}

  .back-link{
    display:inline-block;
    margin-bottom:16px;
    color:var(--text-secondary);
    text-decoration:none;
    font-size:13px;
    border:1px solid var(--border-line);
    padding:6px 12px;
    border-radius:4px;
  }

  .back-link:hover{background:var(--bg-card-hover);}

  /* ---------- Filter bar (premium redesign) ---------- */
  .filter-bar{margin-bottom:20px;}

  .filter-top-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    margin-bottom:10px;
  }

  .search-wrap{
    position:relative;
    width:380px;
    max-width:100%;
    height:44px;
  }

  .search-wrap svg{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    width:16px;
    height:16px;
    stroke:var(--text-secondary);
    pointer-events:none;
  }

  #search-input{
    width:100%;
    height:44px;
    background:#1C2B4F;
    border:1px solid #314A7A;
    border-radius:12px;
    color:#fff;
    font-family:'Inter',sans-serif;
    font-size:13px;
    padding:0 36px 0 40px;
    transition:border-color 0.15s, box-shadow 0.15s;
  }

  #search-input::placeholder{color:#8B95A8;}

  #search-input:focus{
    outline:none;
    border-color:#4C8DFF;
    box-shadow:0 0 0 3px rgba(76,141,255,0.18);
  }

  #search-input:hover{background:#243761;}

  .search-clear-btn{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:var(--text-secondary);
    font-size:14px;
    cursor:pointer;
    display:none;
    line-height:1;
    padding:4px;
  }

  .search-clear-btn:hover{color:#fff;}

  .results-count{
    font-size:12px;
    color:var(--text-secondary);
    white-space:nowrap;
  }

  .filter-controls-row{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
  }

  .fdrop{position:relative;}

  .fdrop-btn{
    display:flex;
    align-items:center;
    gap:6px;
    height:44px;
    padding:0 16px;
    background:#1C2B4F;
    border:1px solid #314A7A;
    border-radius:10px;
    color:#fff;
    font-family:'Inter',sans-serif;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
    transition:background 0.15s, border-color 0.15s;
  }

  .fdrop-btn:hover{background:#243761;}
  .fdrop-btn:focus-visible{outline:none;border-color:#4C8DFF;box-shadow:0 0 0 3px rgba(76,141,255,0.18);}
  .fdrop.open .fdrop-btn{border-color:#4C8DFF;background:#243761;}

  .fdrop-icon{font-size:13px;}
  .fdrop-label{color:var(--text-secondary);}
  .fdrop-val{color:#fff;font-weight:500;}
  .fdrop-caret{color:var(--text-secondary);font-size:10px;margin-left:2px;transition:transform 0.15s;}
  .fdrop.open .fdrop-caret{transform:rotate(180deg);}

  .fdrop-menu{
    position:absolute;
    top:calc(100% + 6px);
    left:0;
    min-width:200px;
    background:#1C2B4F;
    border:1px solid #314A7A;
    border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
    padding:6px;
    z-index:20;
    opacity:0;
    transform:translateY(-6px);
    pointer-events:none;
    transition:opacity 0.15s ease, transform 0.15s ease;
    max-height:280px;
    overflow-y:auto;
  }

  .fdrop.open .fdrop-menu{opacity:1;transform:translateY(0);pointer-events:auto;}

  .fdrop-option{
    padding:8px 10px;
    border-radius:6px;
    font-size:13px;
    color:#fff;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .fdrop-option:hover{background:#243761;}
  .fdrop-option.selected{background:rgba(245,166,35,0.14);color:var(--accent);}

  .clear-filters-btn{
    height:44px;
    padding:0 16px;
    background:transparent;
    border:1px solid #314A7A;
    border-radius:10px;
    color:var(--text-secondary);
    font-family:'Inter',sans-serif;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
    transition:background 0.15s, color 0.15s, border-color 0.15s;
  }

  .clear-filters-btn:hover{background:rgba(226,75,74,0.12);color:var(--critico);border-color:var(--critico);}

  @media (max-width:900px){
    .filter-controls-row{gap:10px;}
    .fdrop-btn, .clear-filters-btn{padding:0 12px;}
  }

  @media (max-width:640px){
    .search-wrap{width:100%;}
    .filter-controls-row{flex-direction:column;align-items:stretch;}
    .fdrop-btn, .clear-filters-btn{width:100%;justify-content:space-between;}
    .fdrop-menu{left:0;right:0;min-width:auto;}
  }

  .badge{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    padding:3px 9px;
    border-radius:10px;
    text-transform:uppercase;
    letter-spacing:0.3px;
  }

  .badge.critico{background:var(--critico-bg);color:var(--critico);}
  .badge.atencao{background:var(--atencao-bg);color:var(--atencao);}
  .badge.normal{background:var(--normal-bg);color:var(--normal);}

  .empty-state, .error-state{
    text-align:center;
    padding:60px 20px;
    color:var(--text-secondary);
  }

  .error-state{color:var(--critico);}

  footer{
    margin-top:24px;
    text-align:center;
    font-size:12px;
    color:var(--text-muted);
  }

  @media (max-width:640px){
    .title-block h1{font-size:22px;}
    .header-meta{text-align:left;}
    header{flex-direction:column;align-items:flex-start;}
  }
</style>
</head>

<script>
  /* =========================================================
     PASSO 1: cole aqui a URL do seu CSV publicado (Google
     Sheets: Arquivo > Compartilhar > Publicar na web > escolha
     a aba do relatório > formato CSV > copiar link)
     ========================================================= */
  const CSV_URL = "https://docs.google.com/spreadsheets/d/1Bk1LEYRj--LbEZx7gs8CMOlrR4kUcpVp/gviz/tq?tqx=out:csv&gid=1912270550";

  const REFRESH_MS = 5 * 60 * 1000;
  let rawRows = [];
  let headers = [];
  let sortState = { mode: "dias-desc" };
  let filterState = { status: "", bucket: "", analista: "" };
  const urlParams = new URLSearchParams(location.search);
  const analistaParam = urlParams.get('analista');

  function parseCSV(text){
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for(let i=0;i<text.length;i++){
      const c = text[i], next = text[i+1];
      if(inQuotes){
        if(c === '"' && next === '"'){ field += '"'; i++; }
        else if(c === '"'){ inQuotes = false; }
        else { field += c; }
      } else {
        if(c === '"'){ inQuotes = true; }
        else if(c === ','){ row.push(field); field = ""; }
        else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
        else if(c === '\r'){ /* skip */ }
        else { field += c; }
      }
    }
    if(field.length || row.length){ row.push(field); rows.push(row); }
    return rows.filter(r => r.some(v => v.trim() !== ""));
  }

  function findColumn(names){
    return headers.find(h => names.some(n => h.toLowerCase().includes(n)));
  }

  function classify(diasStr){
    const dias = parseFloat(String(diasStr).replace(",", "."));
    if(isNaN(dias)) return null;
    if(dias >= 4) return "critico";
    if(dias >= 2) return "atencao";
    return "normal";
  }

  function classifyBucket(diasStr){
    const dias = parseFloat(String(diasStr).replace(",", "."));
    if(isNaN(dias)) return null;
    if(dias <= 1) return "0-1";
    if(dias <= 3) return "2-3";
    if(dias <= 10) return "4-10";
    if(dias <= 20) return "11-20";
    if(dias <= 30) return "21-30";
    if(dias <= 60) return "31-60";
    return "61+";
  }

  function render(){
    const diasCol = findColumn(["dias parado", "dias"]);
    const analistaCol = findColumn(["analista"]);
    const statusColRaw = findColumn(["status"]);

    let rows = rawRows.map(r => {
      const obj = {};
      headers.forEach((h,i) => obj[h] = r[i] ?? "");
      let status = null;
      if(statusColRaw){
        const v = obj[statusColRaw].toLowerCase();
        if(v.includes("crit")) status = "critico";
        else if(v.includes("aten")) status = "atencao";
        else if(v.includes("norm")) status = "normal";
      }
      if(!status && diasCol) status = classify(obj[diasCol]);
      obj.__status = status;
      obj.__bucket = diasCol ? classifyBucket(obj[diasCol]) : null;
      return obj;
    });

    const search = document.getElementById("search-input").value.toLowerCase();
    const statusFilter = filterState.status;
    const bucketFilter = filterState.bucket;
    const analistaCol2 = findColumn(["responsavel", "responsável", "analista"]);

    const scopedRows = analistaParam
      ? rows.filter(r => analistaCol2 && String(r[analistaCol2]).trim().toLowerCase() === analistaParam.trim().toLowerCase())
      : rows;

    let filtered = scopedRows.filter(r => {
      const matchesSearch = !search || Object.values(r).some(v => String(v).toLowerCase().includes(search));
      const matchesStatus = !statusFilter || r.__status === statusFilter;
      const matchesBucket = !bucketFilter || r.__bucket === bucketFilter;
      const matchesAnalistaDrop = !filterState.analista || (analistaCol2 && String(r[analistaCol2]).trim() === filterState.analista);
      return matchesSearch && matchesStatus && matchesBucket && matchesAnalistaDrop;
    });

    if(sortState.mode === "dias-asc"){
      filtered.sort((a,b) => (parseFloat(String(a[diasCol]).replace(",",".")) || 0) - (parseFloat(String(b[diasCol]).replace(",",".")) || 0));
    } else if(sortState.mode === "nome-asc"){
      filtered.sort((a,b) => String(a[analistaCol2]).localeCompare(String(b[analistaCol2]), 'pt-BR'));
    } else {
      filtered.sort((a,b) => (parseFloat(String(b[diasCol]).replace(",",".")) || 0) - (parseFloat(String(a[diasCol]).replace(",",".")) || 0));
    }

    renderKPIs(scopedRows);
    renderBuckets(scopedRows);
    renderCards(filtered);
    renderDirectory(rows, analistaCol2);
    renderTitle();
    populateAnalistaMenu(rows, analistaCol2);
    updateResultsCount(filtered.length);
    document.getElementById("search-clear").style.display = search ? "block" : "none";
  }

  function updateResultsCount(n){
    const el = document.getElementById("results-count");
    el.textContent = n + (n === 1 ? " veículo encontrado" : " veículos encontrados");
  }

  let analistaMenuBuilt = false;
  function populateAnalistaMenu(rows, analistaCol2){
    if(analistaMenuBuilt || !analistaCol2) return;
    const names = Array.from(new Set(rows.map(r => String(r[analistaCol2]).trim()).filter(Boolean))).sort((a,b) => a.localeCompare(b,'pt-BR'));
    if(!names.length) return;
    const menu = document.getElementById("menu-analista");
    let html = `<div class="fdrop-option selected" data-value="">Todos</div>`;
    html += names.map(n => `<div class="fdrop-option" data-value="${n.replace(/"/g,'&quot;')}">${n}</div>`).join("");
    menu.innerHTML = html;
    bindDropdownOptions(document.getElementById("fdrop-analista"), "analista", "val-analista", (v) => { filterState.analista = v; render(); });
    analistaMenuBuilt = true;
  }

  function renderTitle(){
    const titleEl = document.getElementById("page-title");
    const subtitleEl = document.getElementById("page-subtitle");
    if(analistaParam){
      titleEl.textContent = analistaParam;
      subtitleEl.innerHTML = '<a href="' + location.pathname + '" class="back-link" style="margin:0;display:inline;">← Ver todos os analistas</a>';
    } else {
      titleEl.textContent = "Frota parada";
      subtitleEl.textContent = "Controle diário — Loc Frota";
    }
  }

  function renderDirectory(rows, analistaCol2){
    const container = document.getElementById("analyst-directory");
    if(analistaParam || !analistaCol2){ container.innerHTML = ""; return; }

    const counts = {};
    rows.forEach(r => {
      const name = String(r[analistaCol2]).trim();
      if(!name) return;
      if(!counts[name]) counts[name] = { total: 0, critico: 0 };
      counts[name].total++;
      if(r.__status === "critico") counts[name].critico++;
    });

    const names = Object.keys(counts).sort((a,b) => counts[b].total - counts[a].total);
    if(!names.length){ container.innerHTML = ""; return; }

    const cards = names.map(name => {
      const c = counts[name];
      const cls = c.critico > 0 ? "has-critico" : "";
      const url = location.pathname + "?analista=" + encodeURIComponent(name);
      return `<a class="analyst-card" href="${url}"><div class="a-name">${name}</div><div class="a-count ${cls}">${c.total}</div></a>`;
    }).join("");

    container.innerHTML = `<div class="analyst-grid">${cards}</div>`;
  }

  function renderBuckets(rows){
    const labels = {
      "4-10": "4 a 10 dias",
      "11-20": "11 a 20 dias",
      "21-30": "21 a 30 dias",
      "31-60": "31 a 60 dias",
      "61+": "Acima de 60 dias"
    };
    const strip = document.getElementById("bucket-strip");
    strip.innerHTML = Object.keys(labels).map(key => {
      const count = rows.filter(r => r.__bucket === key).length;
      return `<div class="bucket-card"><div class="bucket-label">${labels[key]}</div><div class="bucket-value">${count}</div></div>`;
    }).join("");
  }

  function renderKPIs(rows){
    const total = rows.length;
    const crit = rows.filter(r => r.__status === "critico").length;
    const aten = rows.filter(r => r.__status === "atencao").length;
    const norm = rows.filter(r => r.__status === "normal").length;

    const strip = document.getElementById("kpi-strip");
    strip.innerHTML = `
      <div class="kpi-card total"><div class="kpi-label">Total parados</div><div class="kpi-value">${total}</div></div>
      <div class="kpi-card critico"><div class="kpi-label">Crítico (4+ dias)</div><div class="kpi-value">${crit}</div></div>
      <div class="kpi-card atencao"><div class="kpi-label">Atenção (2-3 dias)</div><div class="kpi-value">${aten}</div></div>
      <div class="kpi-card normal"><div class="kpi-label">Normal (0-1 dia)</div><div class="kpi-value">${norm}</div></div>
    `;
  }

  function renderCards(rows){
    const container = document.getElementById("table-container");
    if(!rows.length){
      container.innerHTML = '<div class="empty-state">Nenhum registro encontrado.</div>';
      return;
    }

    const placaCol = findColumn(["placa"]);
    const modeloCol = findColumn(["modelo"]);
    const clienteCol = findColumn(["cliente"]);
    const diasCol2 = findColumn(["dias parado", "dias"]);
    const pendCol = findColumn(["pendencia", "pendência"]);
    const statusCol = findColumn(["status atual", "status"]);
    const reservaCol = findColumn(["veiculo reserva", "veículo reserva", "reserva"]);
    const solucaoCol = findColumn(["solucao", "solução"]);
    const fornecedorCol = findColumn(["fornecedor"]);
    const respCol = findColumn(["responsavel", "responsável", "analista"]);

    const statusLabel = { critico: "Crítico", atencao: "Atenção", normal: "Normal" };

    container.innerHTML = rows.map(r => {
      const rowClass = r.__status ? `row-${r.__status}` : "";
      const dias = diasCol2 ? r[diasCol2] : "";
      return `
        <div class="vehicle-card ${rowClass}">
          <div class="vc-head">
            <div>
              <div class="vc-name">${respCol ? r[respCol] : ""}</div>
              <div class="vc-sub">${placaCol ? r[placaCol] : ""}${modeloCol ? " · " + r[modeloCol] : ""}</div>
            </div>
            <div class="vc-right">
              ${r.__status ? `<span class="badge ${r.__status}">${statusLabel[r.__status]}</span>` : ""}
              <div class="vc-dias">${dias}${dias !== "" ? " dias" : ""}</div>
            </div>
          </div>
          ${clienteCol ? `<div class="vc-field"><div class="vc-label">Cliente</div><div class="vc-value">${r[clienteCol]}</div></div>` : ""}
          ${pendCol ? `<div class="vc-field"><div class="vc-label">Pendência</div><div class="vc-value">${r[pendCol]}</div></div>` : ""}
          ${solucaoCol ? `<div class="vc-field"><div class="vc-label solucao-label">Solução</div><div class="vc-value">${r[solucaoCol]}</div></div>` : ""}
          <div class="vc-footer">
            ${statusCol ? `<div>Status atual: <span>${r[statusCol]}</span></div>` : ""}
            ${reservaCol ? `<div>Veículo reserva: <span>${r[reservaCol]}</span></div>` : ""}
            ${fornecedorCol ? `<div>Fornecedor: <span>${r[fornecedorCol]}</span></div>` : ""}
          </div>
        </div>`;
    }).join("");
  }

  function setStatusDot(ok){
    document.getElementById("status-dot").className = ok ? "dot" : "dot stale";
  }

  async function loadData(){
    if(CSV_URL.includes("COLE_AQUI")){
      document.getElementById("table-container").innerHTML =
        '<div class="error-state">Configure a variável CSV_URL no início do arquivo com o link do seu Google Sheets publicado.</div>';
      document.getElementById("last-update").textContent = "Não configurado";
      setStatusDot(false);
      return;
    }
    try{
      const res = await fetch(CSV_URL + (CSV_URL.includes("?") ? "&" : "?") + "t=" + Date.now());
      if(!res.ok) throw new Error("Falha ao buscar CSV");
      const text = await res.text();
      const parsed = parseCSV(text);
      headers = parsed[0].map(h => h.trim());
      rawRows = parsed.slice(1);
      render();
      document.getElementById("last-update").textContent = "Atualizado às " + new Date().toLocaleTimeString('pt-BR');
      setStatusDot(true);
    } catch(err){
      document.getElementById("table-container").innerHTML =
        '<div class="error-state">Erro ao carregar dados. Verifique se o link do CSV está correto e publicado.</div>';
      document.getElementById("last-update").textContent = "Erro na última tentativa";
      setStatusDot(false);
    }
  }

  function closeAllDropdowns(except){
    document.querySelectorAll('.fdrop.open').forEach(el => { if(el !== except) el.classList.remove('open'); });
  }

  function bindDropdownOptions(fdropEl, filterKey, valElId, onSelect){
    const btn = fdropEl.querySelector('.fdrop-btn');
    const menu = fdropEl.querySelector('.fdrop-menu');

    btn.onclick = (e) => {
      e.stopPropagation();
      const willOpen = !fdropEl.classList.contains('open');
      closeAllDropdowns();
      if(willOpen) fdropEl.classList.add('open');
    };

    menu.querySelectorAll('.fdrop-option').forEach(opt => {
      opt.onclick = (e) => {
        e.stopPropagation();
        menu.querySelectorAll('.fdrop-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        document.getElementById(valElId).textContent = opt.textContent;
        fdropEl.classList.remove('open');
        onSelect(opt.dataset.value);
      };
    });
  }

  bindDropdownOptions(document.getElementById("fdrop-status"), "status", "val-status", (v) => { filterState.status = v; render(); });
  bindDropdownOptions(document.getElementById("fdrop-faixa"), "bucket", "val-faixa", (v) => { filterState.bucket = v; render(); });
  bindDropdownOptions(document.getElementById("fdrop-ordenar"), "sort", "val-ordenar", (v) => { sortState.mode = v; render(); });

  document.addEventListener("click", () => closeAllDropdowns());

  document.getElementById("search-input").addEventListener("input", render);

  document.getElementById("search-clear").addEventListener("click", () => {
    document.getElementById("search-input").value = "";
    render();
  });

  document.getElementById("clear-filters").addEventListener("click", () => {
    filterState = { status: "", bucket: "", analista: "" };
    sortState.mode = "dias-desc";
    document.getElementById("search-input").value = "";
    document.querySelectorAll('.fdrop-menu').forEach(menu => {
      menu.querySelectorAll('.fdrop-option').forEach(o => o.classList.remove('selected'));
      const first = menu.querySelector('.fdrop-option');
      if(first) first.classList.add('selected');
    });
    document.getElementById("val-status").textContent = "Todos";
    document.getElementById("val-faixa").textContent = "Todas";
    document.getElementById("val-ordenar").textContent = "Maior tempo parado";
    document.getElementById("val-analista").textContent = "Todos";
    render();
  });

  loadData();
  setInterval(loadData, REFRESH_MS);
</script>

</body>
</html>
